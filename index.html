<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAZA PANEL VIP V1</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#ffd700;
  background: radial-gradient(circle at top,#0b0b0b,#000);
}

/* light */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(120deg,transparent 40%,rgba(255,215,0,0.12),transparent 60%);
  animation:shine 5s linear infinite;
}

@keyframes shine{
  0%{transform:translateX(-50%);}
  100%{transform:translateX(50%);}
}

/* START BUTTON */
#startBtn{
  position:absolute;
  padding:14px 28px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:#000;
  background:#ffd700;
  box-shadow:0 0 20px #ffd700;
  z-index:10;
}

/* panel */
.card{
  width:380px;
  padding:20px;
  border-radius:18px;
  background:rgba(10,10,10,0.75);
  border:1px solid rgba(255,215,0,0.3);
  box-shadow:0 0 25px rgba(0,0,0,0.8);

  opacity:0;
  transform:scale(0.95);
  transition:0.5s ease;
}

.card.show{
  opacity:1;
  transform:scale(1);
}

.title{
  text-align:center;
  font-size:22px;
  text-shadow:0 0 10px #ffd700;
}

.sub{
  text-align:center;
  font-size:12px;
  opacity:0.6;
  margin-bottom:15px;
}

.box{
  background:rgba(255,215,0,0.05);
  padding:12px;
  border-radius:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin:12px 0;
}

.switch{
  width:52px;
  height:26px;
  background:#1a1a1a;
  border-radius:30px;
  position:relative;
  cursor:pointer;
}

.dot{
  width:22px;
  height:22px;
  background:#ffd700;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  transition:0.25s;
}

.switch.active .dot{
  left:28px;
}
</style>
</head>

<body>

<button id="startBtn">▶ เริ่มเกม</button>

<div class="card" id="card">

  <div class="title">ZAZA PANEL VIP V1</div>
  <div class="sub">SYSTEM UI ✨</div>

  <div class="box">

    <div class="row">
      🎯 ล็อกเป้า 90%
      <div class="switch" onclick="toggle(this)"><div class="dot"></div></div>
    </div>

    <div class="row">
      🧲 ดูดหัว 97%
      <div class="switch" onclick="toggle(this)"><div class="dot"></div></div>
    </div>

    <div class="row">
      ⚙️ DPI 2000
      <div class="switch" onclick="toggle(this)"><div class="dot"></div></div>
    </div>

    <div class="row">
      🛡️ กันดำ
      <div class="switch" onclick="toggle(this)"><div class="dot"></div></div>
    </div>

  </div>

</div>

<script>

let ctx;

/* START BUTTON */
document.getElementById("startBtn").onclick = ()=>{
  document.getElementById("startBtn").style.display="none";
  document.getElementById("card").classList.add("show");

  ctx = new (window.AudioContext || window.webkitAudioContext)();
  playSound();
};

/* iOS style sound */
function playSound(){
  const o = ctx.createOscillator();
  const g = ctx.createGain();

  o.type="sine";
  o.frequency.setValueAtTime(520, ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime+0.25);

  g.gain.setValueAtTime(0.25, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.6);

  o.connect(g);
  g.connect(ctx.destination);

  o.start();
  o.stop(ctx.currentTime+0.6);
}

/* toggle */
function toggle(el){
  el.classList.toggle("active");
}

</script>

</body>
</html>
