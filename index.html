<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAZA PANEL VIP V1</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:#000;
  color:#ffd700;
  overflow:hidden;
}

/* light effect */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(120deg,transparent 40%,rgba(255,215,0,0.08),transparent 60%);
  animation:shine 6s linear infinite;
  pointer-events:none;
}

@keyframes shine{
  0%{transform:translateX(-30%);}
  100%{transform:translateX(30%);}
}

.card{
  width:360px;
  padding:20px;
  border-radius:16px;
  background:#0b0b0b;
  border:1px solid #ffd700;
  z-index:1;
}

.title{
  text-align:center;
  font-size:20px;
  margin-bottom:5px;
}

.sub{
  text-align:center;
  font-size:12px;
  opacity:0.6;
  margin-bottom:15px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin:10px 0;
  background:rgba(255,215,0,0.05);
  border-radius:10px;
}

/* ✔ switch button */
.check{
  width:28px;
  height:28px;
  border:2px solid #ffd700;
  border-radius:6px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;
}

.check.active{
  background:#ffd700;
  color:#000;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

  <div class="title">ZAZA PANEL VIP V1</div>
  <div class="sub">SYSTEM UI BY : โอเบย์</div>

  <div class="row">
    🎯 ล็อกเป้า 90%
    <div class="check" onclick="toggle(this)">✔</div>
  </div>

  <div class="row">
    🧲 ดูดหัว 97%
    <div class="check" onclick="toggle(this)">✔</div>
  </div>

  <div class="row">
    ⚙️ DPI 2000
    <div class="check" onclick="toggle(this)">✔</div>
  </div>

  <div class="row">
    🛡️ กันดำ
    <div class="check" onclick="toggle(this)">✔</div>
  </div>

</div>

<script>
function toggle(el){
  el.classList.toggle("active");
}
</script>

</body>
</html>
