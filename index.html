<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP 3D PANEL</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: radial-gradient(circle at top,#1a1400,#000);
  overflow:hidden;
  color:#ffd700;
}

/* แสงทองวิ่ง */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(120deg,transparent 40%,rgba(255,215,0,0.12),transparent 60%);
  animation:shine 5s linear infinite;
  transform:rotate(25deg);
}

@keyframes shine{
  0%{transform:translateX(-50%) rotate(25deg);}
  100%{transform:translateX(50%) rotate(25deg);}
}

/* 3D card */
.card{
  width:380px;
  padding:20px;
  border-radius:20px;
  background:rgba(25,18,0,0.85);
  border:1px solid #ffd700;
  box-shadow:0 20px 60px rgba(0,0,0,0.8), 0 0 25px #ffd700;
  transform-style:preserve-3d;
  transition:transform 0.15s ease;
  z-index:1;
}

/* title */
.title{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  text-shadow:0 0 10px #ffd700;
}

.subtitle{
  text-align:center;
  font-size:12px;
  opacity:0.8;
  margin-bottom:15px;
}

/* box */
.box{
  background:rgba(255,215,0,0.08);
  padding:12px;
  border-radius:12px;
}

/* toggle */
.toggle{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:12px 0;
  font-size:14px;
}

.switch{
  width:45px;
  height:22px;
  background:#3a2f00;
  border-radius:20px;
  position:relative;
  cursor:pointer;
  box-shadow:0 0 6px #ffd700;
}

.circle{
  width:18px;
  height:18px;
  background:#ffd700;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  transition:0.3s;
}

.switch.active .circle{
  left:25px;
  background:#fff3b0;
}
</style>
</head>

<body>

<div class="card" id="card">

  <div class="title">VIP 3D PANEL</div>
  <div class="subtitle">ULTIMATE UI ✨</div>

  <div class="box">

    <div class="toggle">
      🎯 ล็อกเป้า 90%
      <div class="switch" onclick="toggle(this)"><div class="circle"></div></div>
    </div>

    <div class="toggle">
      🧲 ดูดหัว 97%
      <div class="switch" onclick="toggle(this)"><div class="circle"></div></div>
    </div>

    <div class="toggle">
      ⚙️ DPI 2000
      <div class="switch" onclick="toggle(this)"><div class="circle"></div></div>
    </div>

    <div class="toggle">
      🛡️ กันดำ
      <div class="switch" onclick="toggle(this)"><div class="circle"></div></div>
    </div>

  </div>
</div>

<script>

/* toggle */
function toggle(el){
  el.classList.toggle("active");
}

/* 3D tilt */
const card = document.getElementById("card");

document.addEventListener("mousemove",(e)=>{
  let x = (window.innerWidth/2 - e.pageX)/20;
  let y = (window.innerHeight/2 - e.pageY)/20;
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* startup sound */
function playStartupSound(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(520, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.2);

  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.6);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.6);
}

/* play on open */
window.addEventListener("load", ()=>{
  playStartupSound();
});

</script>

</body>
  </html>
