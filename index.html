<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAZA PANEL VIP V1</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  color:#ffd700;
  overflow:hidden;

  /* 🌑 พื้นหลังหดหู่ */
  background:
    radial-gradient(circle at top, rgba(0,0,0,0.2), #000 70%),
    linear-gradient(180deg,#050505,#000);
}

/* หมอกมืด */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:3px 3px;
  opacity:0.2;
  animation:move 20s linear infinite;
}

@keyframes move{
  0%{transform:translateY(0);}
  100%{transform:translateY(-50px);}
}

/* light sweep ทองจาง ๆ */
body::after{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(120deg,transparent 45%,rgba(255,215,0,0.08),transparent 60%);
  animation:shine 6s linear infinite;
}

@keyframes shine{
  0%{transform:translateX(-50%);}
  100%{transform:translateX(50%);}
}

/* start screen */
#start{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
  z-index:10;
  color:#ffd700;
}

/* panel */
.card{
  width:380px;
  padding:20px;
  border-radius:18px;

  background:rgba(10,10,10,0.75);
  border:1px solid rgba(255,215,0,0.4);

  box-shadow:
    0 0 25px rgba(0,0,0,0.8),
    0 0 10px rgba(255,215,0,0.2);
}

.title{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  text-shadow:0 0 8px #ffd700;
}

.sub{
  text-align:center;
  font-size:12px;
  opacity:0.6;
  margin-bottom:15px;
}

.box{
  background:rgba(255,215,0,0.05);
  padding:12px;
  border-radius:12px;
}

/* row */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:12px 0;
  font-size:14px;
}

/* switch */
.switch{
  width:52px;
  height:26px;
  background:#1a1a1a;
  border-radius:30px;
  position:relative;
  cursor:pointer;
  box-shadow:0 0 6px rgba(255,215,0,0.3);
}

.dot{
  width:22px;
  height:22px;
  background:#ffd700;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  transition:0.25s;
}

.switch.active .dot{
  left:28px;
}
</style>
</head>

<body>

<div id="start" onclick="startApp()">แตะเพื่อเข้า ZAZA PANEL VIP V1</div>

<div class="card">

  <div class="title">ZAZA PANEL VIP V1</div>
  <div class="sub">SYSTEM UI ✨ BY : โอเบย์</div>

  <div class="box">

    <div class="row">
      🎯 ล็อกเป้า 90%
      <div class="switch" onclick="toggle(this)"><div class="dot"></div></div>
    </div>

    <div class="row">
      🧲 ดูดหัว 97%
      <div class="switch" onclick="toggle(this)"><div class="dot"></div></div>
    </div>

    <div class="row">
      ⚙️ DPI 2000
      <div class="switch" onclick="toggle(this)"><div class="dot"></div></div>
    </div>

    <div class="row">
      🛡️ กันดำ
      <div class="switch" onclick="toggle(this)"><div class="dot"></div></div>
    </div>

  </div>

</div>

<script>

function startApp(){
  document.getElementById("start").style.display="none";
}

function toggle(el){
  el.classList.toggle("active");
}

</script>

</body>
</html>
