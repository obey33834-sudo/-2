<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAZA PANEL VIP V1</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: radial-gradient(circle at top,#0b0b0b,#000);
  color:#ffd700;
  overflow:hidden;
}

/* light */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(120deg,transparent 40%,rgba(255,215,0,0.10),transparent 60%);
  animation:shine 6s linear infinite;
}

@keyframes shine{
  0%{transform:translateX(-50%);}
  100%{transform:translateX(50%);}
}

/* card */
.card{
  width:380px;
  padding:20px;
  border-radius:18px;
  background:rgba(10,10,10,0.78);
  border:1px solid rgba(255,215,0,0.25);
  box-shadow:0 0 25px rgba(0,0,0,0.8);
}

.title{
  text-align:center;
  font-size:22px;
  text-shadow:0 0 10px #ffd700;
}

.sub{
  text-align:center;
  font-size:12px;
  opacity:0.6;
  margin-bottom:15px;
}

.box{
  background:rgba(255,215,0,0.05);
  padding:12px;
  border-radius:12px;
}

/* row */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:12px 0;
  font-size:14px;
}

/* checkbox style */
.check{
  width:22px;
  height:22px;
  border-radius:6px;
  border:2px solid #ffd700;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  box-shadow:0 0 8px rgba(255,215,0,0.2);
}

.check.active{
  background:#ffd700;
  color:#000;
}

.check::after{
  content:"✔";
  font-size:14px;
  display:none;
}

.check.active::after{
  display:block;
}
</style>
</head>

<body>

<div class="card">

  <div class="title">ZAZA PANEL VIP V1</div>
  <div class="sub">SYSTEM UI ✨ BY : โอเบย์</div>

  <div class="box">

    <div class="row">
      🎯 ล็อกเป้า 90%
      <div class="check" onclick="toggle(this)"></div>
    </div>

    <div class="row">
      🧲 ดูดหัว 97%
      <div class="check" onclick="toggle(this)"></div>
    </div>

    <div class="row">
      ⚙️ DPI 2000
      <div class="check" onclick="toggle(this)"></div>
    </div>

    <div class="row">
      🛡️ กันดำ
      <div class="check" onclick="toggle(this)"></div>
    </div>

  </div>

</div>

<script>
function toggle(el){
  el.classList.toggle("active");
}
</script>

</body>
</html>
