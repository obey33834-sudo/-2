<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP ULTRA PANEL</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#120c00,#000);
  font-family:Arial;
  color:#ffd700;
}

/* particles */
.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:#ffd700;
  border-radius:50%;
  animation:float 6s linear infinite;
  opacity:0.5;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* glow bg beam */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(120deg,transparent 40%,rgba(255,215,0,0.15),transparent 60%);
  animation:shine 4s linear infinite;
  transform:rotate(25deg);
}

@keyframes shine{
  0%{transform:translateX(-50%) rotate(25deg);}
  100%{transform:translateX(50%) rotate(25deg);}
}

/* SPLASH */
.splash{
  position:absolute;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  animation:fadeOut 2.5s forwards;
  z-index:10;
}

.splash h1{
  font-size:28px;
  text-shadow:0 0 20px #ffd700;
}

@keyframes fadeOut{
  0%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0;visibility:hidden;}
}

/* card */
.card{
  width:380px;
  padding:20px;
  border-radius:22px;
  background:rgba(30,20,0,0.85);
  border:1px solid #ffd700;
  box-shadow:0 30px 80px rgba(0,0,0,0.9),0 0 40px #ffd700;
  transform-style:preserve-3d;
  transition:0.1s;
  z-index:2;
}

/* title */
.title{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  text-shadow:0 0 15px #ffd700;
}

.subtitle{
  text-align:center;
  font-size:12px;
  opacity:0.8;
}

/* box */
.box{
  margin-top:10px;
  padding:12px;
  background:rgba(255,215,0,0.08);
  border-radius:12px;
}

/* toggle */
.toggle{
  display:flex;
  justify-content:space-between;
  margin:12px 0;
}

.switch{
  width:50px;
  height:24px;
  background:#2b2000;
  border-radius:20px;
  position:relative;
  cursor:pointer;
  box-shadow:0 0 10px #ffd700;
  transition:0.3s;
}

.circle{
  width:20px;
  height:20px;
  background:#ffd700;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  transition:0.3s;
}

.switch.active{
  box-shadow:0 0 25px #ffd700;
}

.switch.active .circle{
  left:28px;
}
</style>
</head>

<body>

<!-- SPLASH SCREEN -->
<div class="splash">
  <h1>VIP PANEL LOADING...</h1>
</div>

<div class="card" id="card">

  <div class="title">VIP ULTRA PANEL</div>
  <div class="subtitle">LEGEND UI SYSTEM</div>

  <div class="box">
    <div class="toggle">
      🎯 MODE A
      <div class="switch" onclick="toggle(this)"><div class="circle"></div></div>
    </div>

    <div class="toggle">
      ⚡ MODE B
      <div class="switch" onclick="toggle(this)"><div class="circle"></div></div>
    </div>

    <div class="toggle">
      🔥 MODE C
      <div class="switch" onclick="toggle(this)"><div class="circle"></div></div>
    </div>
  </div>

</div>

<script>

/* particles */
for(let i=0;i<40;i++){
  let p = document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(p);
}

/* toggle */
function toggle(el){
  el.classList.toggle("active");
  click();
}

/* sound */
function click(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();

  o.type="sine";
  o.frequency.value=600;
  g.gain.value=0.05;

  o.connect(g);
  g.connect(ctx.destination);

  o.start();
  o.stop(ctx.currentTime+0.1);
}

/* 3D tilt */
const card=document.getElementById("card");
document.addEventListener("mousemove",(e)=>{
  let x=(window.innerWidth/2-e.pageX)/25;
  let y=(window.innerHeight/2-e.pageY)/25;
  card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
<div id="start" style="
position:absolute;inset:0;
display:flex;justify-content:center;align-items:center;
background:black;color:#ffd700;
font-size:20px;
z-index:999;
">
แตะเพื่อเข้า VIP PANEL
</div>
