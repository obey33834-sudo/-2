<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN CYBER PANEL</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:#05070a;
  color:#00d9ff;
  overflow:hidden;
}

/* cyber glow background */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top,#00d9ff22,transparent 60%),
    linear-gradient(120deg,transparent,rgba(0,217,255,0.08),transparent);
  animation:move 6s linear infinite;
}

@keyframes move{
  0%{transform:translateX(-20%);}
  100%{transform:translateX(20%);}
}

.panel{
  width:380px;
  padding:20px;
  border-radius:16px;
  background:rgba(5,10,15,0.85);
  border:1px solid rgba(0,217,255,0.4);
  box-shadow:0 0 20px rgba(0,217,255,0.2);
  z-index:2;
}

.title{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  text-shadow:0 0 10px #00d9ff;
}

.sub{
  text-align:center;
  font-size:12px;
  opacity:0.7;
  margin-bottom:15px;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin:10px 0;
  background:rgba(0,217,255,0.05);
  border-radius:10px;
}

/* cyber toggle */
.toggle{
  width:52px;
  height:26px;
  border-radius:20px;
  background:#0b1a22;
  border:1px solid #00d9ff;
  position:relative;
  box-shadow:0 0 8px rgba(0,217,255,0.2);
}

.toggle::after{
  content:"";
  width:20px;
  height:20px;
  background:#00d9ff;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  box-shadow:0 0 10px #00d9ff;
}
</style>
</head>

<body>

<div class="panel">

  <div class="title">CYBER ADMIN PANEL</div>
  <div class="sub">SYSTEM STATUS: ONLINE</div>

  <div class="item">
    🎯 ล็อคหัว 100%
    <div class="toggle"></div>
  </div>

  <div class="item">
    🧲 ดูดหัว 100%
    <div class="toggle"></div>
  </div>

  <div class="item">
    👆 DPI (เลื่อนนิ้ว)
    <div class="toggle"></div>
  </div>

</div>

</body>
</html>
